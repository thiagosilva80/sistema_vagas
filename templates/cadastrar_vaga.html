<!DOCTYPE html>
<html>
<head>

<title>Cadastrar Vaga</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">


</head>
<body>

<div class="container">

    <div class="card">

        <h1>Cadastrar Vaga</h1>

        <form method="POST">

            <input
            type="text"
            name="titulo"
            placeholder="Título da vaga"
            required>

            <input
            type="text"
            name="empresa"
            placeholder="Empresa"
            required>

            <textarea
            name="descricao"
            rows="5"
            placeholder="Descrição da vaga"></textarea>

            <button class="btn" type="submit">
                Salvar
            </button>

        </form>

    </div>

</div>

</body>
</html>
