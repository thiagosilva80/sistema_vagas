<!DOCTYPE html>
<html>
<head>

<title>Cadastro</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>


<div class="container">


    <div class="form-box">


        <h1>Criar Conta</h1>


        <form method="POST">


            <input
            type="text"
            name="nome"
            placeholder="Nome"
            required>


            <input
            type="email"
            name="email"
            placeholder="Email"
            required>


            <input
            type="password"
            name="senha"
            placeholder="Senha"
            required>


            <button type="submit">
                Cadastrar
            </button>


        </form>


    </div>


</div>


</body>
</html>
