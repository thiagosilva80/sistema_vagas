<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="form-box">

        <h1>Login</h1>

        <form method="POST">

            <input
            type="email"
            name="email"
            placeholder="Email">

            <input
            type="password"
            name="senha"
            placeholder="Senha">


            <button type="submit">
                Entrar
            </button>

        </form>

    </div>

</div>


</body>
</html>
